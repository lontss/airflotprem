<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Контакты</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f7f9;
            color: #333;
        }

        header {
            background-color: #c4d5e6;
            padding: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            border-bottom: 2px solid #a8bdcf;
        }

        .logo-text {
            font-size: 36px;
            font-weight: bold;
            margin: 0;
            letter-spacing: 1px;
        }

        .promo-banner {
            width: 100%;
            height: 250px;
            background-color: #cbdceb;
            overflow: hidden;
        }

        .promo-banner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        main {
            padding: 50px 20px;
            max-width: 1100px;
            margin: 0 auto;
        }

        .welcome-section {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            position: relative; 
            min-height: 180px; 
        }

        .contact-text {
            text-align: left;
            padding-left: 15%;
        }

        .contact-text h2 {
            color: #1f94b7;
            margin-top: 0;
            font-size: 28px;
        }

        .contact-text p {
            font-size: 18px;
            margin: 10px 0;
        }


        .my-image {
            position: absolute;
            top: 50%;
            right: 15%; /
            transform: translateY(-50%); 
        }

        .my-image img {
            display: block;
            border-radius: 10px;
        }

        nav {
            background-color: #c4d5e6;
            padding: 20px 0;
        }

        .nav-container {
            display: flex;
            justify-content: center;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        nav button {
            background-color: #8bb3db;
            border: 1px solid #7a9fc4;
            padding: 15px 30px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.2s;
        }

        nav button:hover {
            background-color: #1f94b7;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        footer {
            background-color: #c4d5e6;
            padding: 20px 40px;
            font-size: 14px;
            text-align: center;
            border-top: 1px solid #a8bdcf;
            margin-top: 50px;
        }

        
        @media (max-width: 768px) {
            .welcome-section {
                display: flex;
                flex-direction: column;
                align-items: center;
                text-align: center;
                padding: 30px 20px;
            }
            .contact-text {
                padding-left: 0;
                margin-bottom: 20px;
                text-align: center;
            }
            .my-image {
                position: static; 
                transform: none;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1 class="logo-text">Контакты</h1>
    </header>

    <div class="promo-banner"> 
        <img src="images/rec.jpg" alt="Рекламный баннер"> 
    </div>

    <main>
        <div class="welcome-section">
            <div class="contact-text">
                <h2>Обратная связь</h2>
                <p>Номер: <b>8 925 410 23 87</b></p>
                <p>Почта: <b>sky.flyer.2026@gmail.com</b></p>
            </div>

           
            <div class="my-image">
                <img src="images/tel.jpg" width="150" alt="Контакт">
            </div>
        </div>
    </main>

    <nav>
        <div class="nav-container">
            <button type="button" onclick="location.href='index.html'" style="color: paleturquoise; text-decoration: none;">Назад</button>
        </div>
    </nav>

    <footer>
        &copy; 2026 год | Сайт создан Ивановым Егором | <strong>e-mail:</strong> egorma289@gmail.com
    </footer>

</body>
</html>
